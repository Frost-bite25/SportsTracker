name: Refresh race data

# Runs on GitHub's servers — works even when your computer is off.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC)
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write             # allow the job to commit data.json back

concurrency:
  group: refresh-race-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update data.json (F1 + MotoGP)
        run: node scripts/update-data.mjs

      - name: Commit if changed
        run: |
          git config user.name  "race-tracker-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-refresh race data [skip ci]"
            git push
          fi
