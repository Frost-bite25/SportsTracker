<title>Race Tracker — F1 · MotoGP · AMA SX/MX · Hard Enduro</title>
<!--
  ============================================================================
  HOW THIS PAGE STAYS UP TO DATE
  ============================================================================
  • F1  — updates ITSELF. Every time you open the page it pulls the live 2026
          schedule and race winners from the free Jolpica/Ergast F1 API. If
          you're offline or the API is down, it falls back to the built-in
          data below. A small "● LIVE" badge shows when live data loaded.

  • MotoGP / Supercross / Motocross / Hard Enduro — these series have no public
          API, so they read from the built-in data below. A weekly scheduled
          task (set up in Cowork) re-checks results + calendar changes and
          rewrites this file automatically, so they stay current too.

  ----------------------------------------------------------------------------
  WHERE THE DATA COMES FROM
  ----------------------------------------------------------------------------
  On load the page fetches a same-origin "data.json" (sits next to this file)
  and uses it for every series. That file is what the GitHub Action and the
  weekly task keep up to date, so the HOSTED site refreshes for all sports.
  If data.json is missing (e.g. you opened this file directly off disk), the
  page falls back to the SERIES data embedded below, so it always works.
  F1 additionally fetches the live API client-side for instant freshness.

  ----------------------------------------------------------------------------
  EDITING BY HAND (optional)
  ----------------------------------------------------------------------------
  Edit data.json to change what the hosted site shows. The SERIES object below
  is the offline fallback / seed. Each round:

      { r:1, date:"2026-03-08", name:"Australian GP",
        venue:"Albert Park, Melbourne", winner:"" }

  - date : race day, always YYYY-MM-DD (drives the countdown + past/upcoming split)
  - winner : leave "" until run, then type the winner. For F1 this is filled
             automatically by the live feed.
  - prov:true : marks a round whose date isn't fully confirmed (shows a tag).

  HOSTING FREE ON GITHUB: push race-tracker.html to a repo, then Settings >
  Pages > deploy from branch. Self-contained, no build step. (Note: the weekly
  scheduled refresh updates your LOCAL copy — re-push to update the live site,
  or just open the local file. F1 live data works either way.)
  ============================================================================
-->
<style>

  *{box-sizing:border-box;margin:0;padding:0}

  .tab:hover{color:var(--txt);border-color:var(--accent)}

  .wrap{max-width:860px;margin:0 auto;padding:22px 16px 60px}

  .next{
    border:1px solid var(--accent);border-radius:14px;padding:18px 20px;
    background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 22%,transparent),var(--panel));
    margin-bottom:26px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .next .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:800}
  .next .nm{font-size:20px;font-weight:800;margin-top:3px}
  .next .vn{color:var(--muted);font-size:13px;margin-top:2px}
  .count{text-align:center;min-width:84px}
  .count .num{font-size:30px;font-weight:800;line-height:1;color:var(--accent)}
  .count .unit{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .count .when{font-size:12px;color:var(--muted)}

  .live{
    display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;
    letter-spacing:.5px;color:#27c463;margin-left:8px;vertical-align:middle;
  }
  .live::before{content:"";width:8px;height:8px;border-radius:50%;background:#27c463;
    box-shadow:0 0 0 0 rgba(39,196,99,.6);animation:pulse 1.8s infinite}
  .live.cached{color:var(--muted)} .live.cached::before{background:var(--muted);animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(39,196,99,.6)}70%{box-shadow:0 0 0 7px rgba(39,196,99,0)}100%{box-shadow:0 0 0 0 rgba(39,196,99,0)}}

  .sec-title{
    font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
    font-weight:800;margin:24px 4px 12px;border-left:3px solid var(--accent);padding-left:10px;

  .row{
    display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line);

  .empty{color:var(--muted);font-size:13px;padding:10px 4px}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:24px 16px 40px;border-top:1px solid var(--line)}
  footer code{background:var(--panel2);padding:1px 6px;border-radius:5px;color:var(--txt)}

/* ===========================================================================
   DATA OVERLAY — fetch same-origin data.json (kept current by the GitHub
   Action + weekly task). Falls back to the embedded SERIES data if absent.
   =========================================================================== */
async function loadDataOverlay(){
  try{
    const r = await fetch("./data.json", { cache:"no-store" });
    if(!r.ok) return;
    const d = await r.json();
    if(d && d.series){
      for(const k of Object.keys(d.series)){
        if(SERIES[k] && Array.isArray(d.series[k].rounds))
          SERIES[k].rounds = d.series[k].rounds;
      }
    }
  }catch(e){ /* no data.json (e.g. local file) — use embedded data */ }
}

/* ===========================================================================
   LIVE F1 — pulls schedule + winners from Jolpica/Ergast. Fails silently to
   the embedded/overlay data if offline or blocked.
   =========================================================================== */
async function loadF1Live(){
  const cfg = SERIES.f1.live;
  try{
    const [sRes, wRes] = await Promise.all([ fetch(cfg.races), fetch(cfg.winners) ]);
    if(!sRes.ok || !wRes.ok) throw new Error("bad status");
    const sched = (await sRes.json()).MRData.RaceTable.Races || [];
    const wins  = (await wRes.json()).MRData.RaceTable.Races || [];
    // Overlay confirmed race dates from the live schedule.
    sched.forEach(r=>{
      const rd = SERIES.f1.rounds.find(x=>x.r === +r.round);
      if(rd && r.date) rd.date = r.date;
    });
    // Overlay winners (the value that changes each weekend).
    wins.forEach(r=>{
      const w = r.Results && r.Results[0] && r.Results[0].Driver;
      const rd = SERIES.f1.rounds.find(x=>x.r === +r.round);
      if(rd && w) rd.winner = (w.givenName + " " + w.familyName).trim();
    });
    SERIES.f1.liveState = "live";
  }catch(e){
    SERIES.f1.liveState = "cached";
  }
  if(current === "f1") render("f1");
}

/* ===========================================================================
   RENDERING
   =========================================================================== */
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const order = ["f1","motogp","sx","mx","he"];
let current = "f1";

const fmtDate = iso => new Date(iso+"T00:00:00")
  .toLocaleDateString(undefined,{day:"numeric",month:"short"});
const daysTo = iso => Math.round((new Date(iso+"T00:00:00") - TODAY)/86400000);

function rowHTML(rd, done){
  const win = rd.winner && rd.winner.trim()
    ? `<span class="win">🏆 ${rd.winner}</span>`
    : (done ? `<span class="tag">result not entered</span>` : "");
  const prov = rd.prov ? `<span class="prov">provisional</span>` : "";
  return `<div class="row ${done?'done':''}">
      <div class="rd">${rd.r}</div>
      <div class="info"><div class="n">${rd.name}${prov}</div><div class="v">${rd.venue}</div></div>
      <div class="meta"><div class="d">${fmtDate(rd.date)}</div>${win}</div>
    </div>`;
}

function liveBadge(s){
  if(!s.live) return "";
  if(s.liveState === "live")   return `<span class="live">LIVE</span>`;
  if(s.liveState === "cached") return `<span class="live cached">cached</span>`;
  return `<span class="live cached">loading…</span>`;
}

function render(key){
  current = key;
  const s = SERIES[key];
  document.documentElement.style.setProperty("--accent", s.accent);
  [...document.querySelectorAll(".tab")].forEach(t =>
    t.classList.toggle("active", t.dataset.k === key));

  const past = s.rounds.filter(r => daysTo(r.date) < 0);
  const upcoming = s.rounds.filter(r => daysTo(r.date) >= 0);
  const next = upcoming[0];

  let html = "";
  if(next){
    const dd = daysTo(next.date);
    html += `<div class="next">
        <div><div class="lbl">Up next · ${s.label} ${liveBadge(s)}</div>
          <div class="nm">R${next.r} — ${next.name}</div>
          <div class="vn">${next.venue}</div></div>
        <div class="count">
          ${dd===0 ? `<div class="num" style="font-size:20px">TODAY</div>`
                   : `<div class="num">${dd}</div><div class="unit">day${dd===1?'':'s'} to go</div>`}
          <div class="when">${fmtDate(next.date)} 2026</div>
        </div></div>`;
  } else {
    html += `<div class="next"><div><div class="lbl">${s.label} ${liveBadge(s)}</div>
        <div class="nm">Season complete</div>
        <div class="vn">All ${s.rounds.length} rounds have run — see results below</div></div></div>`;
  }

  html += `<div class="sec-title">Upcoming ${s.unit}s</div>`;
  html += upcoming.length
    ? upcoming.map(r => rowHTML(r,false)).join("")
    : `<div class="empty">No upcoming rounds — the season has finished.</div>`;

  html += `<div class="sec-title">Results &amp; completed ${s.unit}s</div>`;
  html += past.length
    ? past.slice().reverse().map(r => rowHTML(r,true)).join("")
    : `<div class="empty">No rounds completed yet this season.</div>`;

  document.getElementById("view").innerHTML = html;
}

// Build tabs
const tabsEl = document.getElementById("tabs");
order.forEach(k=>{
  const b = document.createElement("button");
  b.className = "tab"; b.dataset.k = k; b.textContent = SERIES[k].tab;
  b.onclick = ()=>render(k);
  tabsEl.appendChild(b);
});
// Startup: render fallback immediately, overlay data.json, then live F1.
(async () => {
  render("f1");
  await loadDataOverlay(); render(current);
  loadF1Live();   // F1 live API for instant freshness; updates view when ready
})();
</script>
</body>
</html>
