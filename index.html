<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plett Airport Business Park — Tenant Lease Tracker</title>
<style>
  :root{
    --navy:#1F3864;
    --navy-dark:#152A4A;
    --paper:#F5F6F8;
    --card:#FFFFFF;
    --border:#E1E4E9;
    --text:#242A33;
    --muted:#6B7280;
    --green-bg:#E6F4EA; --green-text:#1E7B34;
    --yellow-bg:#FFF4CE; --yellow-text:#8A6400;
    --red-bg:#FBE1E1;   --red-text:#9C1F1F;
    --grey-bg:#EAEAEA;  --grey-text:#5A5A5A;
    --blue-bg:#E8EEFB;  --blue-text:#1F3864;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--paper);
    color:var(--text);
  }
  header{
    background:linear-gradient(135deg,var(--navy),var(--navy-dark));
    color:#fff;
    padding:28px 32px 22px;
  }
  header h1{margin:0 0 4px;font-size:1.5rem;font-weight:700;}
  header .sub{font-size:.85rem;color:#C9D3E8;}
  header .asof{font-size:.8rem;color:#AFC0E0;margin-top:10px;}

  .wrap{max-width:1560px;margin:0 auto;padding:24px 20px 60px;}

  .kpis{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
    gap:14px;
    margin-bottom:28px;
  }
  .kpi{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px 18px;
  }
  .kpi .label{font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;}
  .kpi .value{font-size:1.5rem;font-weight:700;margin-top:4px;color:var(--navy);}
  .kpi .value.warn{color:var(--red-text);}

  .cards{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:14px;
  }
  @media (max-width:1000px){
    .cards{grid-template-columns:repeat(2,minmax(0,1fr));}
  }
  @media (max-width:560px){
    .cards{grid-template-columns:1fr;}
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .card-head{
    padding:14px 14px 10px;
    border-bottom:1px solid var(--border);
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .card-head .title-block{display:flex;flex-direction:column;}
  .unit-badge{
    display:inline-block;
    background:var(--navy);
    color:#fff;
    font-weight:700;
    font-size:.72rem;
    letter-spacing:.03em;
    padding:3px 9px;
    border-radius:999px;
    margin-bottom:6px;
  }
  .card-head h2{margin:0;font-size:.98rem;font-weight:700;line-height:1.25;}
  .card-head .legal{font-size:.72rem;color:var(--muted);margin-top:3px;line-height:1.35;}
  .status-pill{
    font-size:.68rem;
    font-weight:700;
    padding:4px 9px;
    border-radius:999px;
    white-space:nowrap;
    height:fit-content;
    align-self:flex-start;
  }
  .status-green{background:var(--green-bg);color:var(--green-text);}
  .status-yellow{background:var(--yellow-bg);color:var(--yellow-text);}
  .status-red{background:var(--red-bg);color:var(--red-text);}
  .status-grey{background:var(--grey-bg);color:var(--grey-text);}

  .card-body{padding:12px 14px 4px;flex:1;}
  .row{
    display:flex;
    flex-direction:column;
    gap:1px;
    padding:6px 0;
    border-bottom:1px dashed var(--border);
    font-size:.78rem;
  }
  .row:last-child{border-bottom:none;}
  .row .k{color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.03em;}
  .row .v{font-weight:600;text-align:left;}
  .rent-highlight{
    background:var(--blue-bg);
    border-radius:8px;
    padding:9px 10px;
    margin:6px 0 4px;
  }
  .rent-highlight .k{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;}
  .rent-highlight .v{font-size:1.05rem;font-weight:700;color:var(--navy);margin-top:2px;}
  .contact{font-size:.76rem;color:var(--muted);margin-top:2px;line-height:1.4;word-break:break-word;}
  .contact a{color:var(--navy);text-decoration:none;}
  .contact a:hover{text-decoration:underline;}

  details{border-top:1px solid var(--border);padding:9px 14px 12px;}
  summary{
    cursor:pointer;
    font-size:.78rem;
    font-weight:700;
    color:var(--navy);
    list-style:none;
    display:flex;
    align-items:center;
    gap:6px;
  }
  summary::-webkit-details-marker{display:none;}
  summary:before{content:"▸";display:inline-block;transition:transform .15s;}
  details[open] summary:before{transform:rotate(90deg);}
  .flag-text{font-size:.78rem;color:var(--text);margin-top:8px;line-height:1.5;}

  footer{
    text-align:center;
    font-size:.75rem;
    color:var(--muted);
    padding:20px;
  }

  @media (max-width:480px){
    header{padding:20px 18px;}
    .wrap{padding:18px 12px 40px;}
  }
</style>
</head>
<body>

<header>
  <h1>Plett Airport Business Park — Tenant Lease Tracker</h1>
  <div class="sub">Landlord: Black Oystercatcher Investments 5 (Pty) Ltd</div>
  <div class="asof" id="asof"></div>
</header>

<div class="wrap">

  <div class="kpis" id="kpis"></div>

  <div class="cards" id="cards"></div>

</div>

<footer>
  Generated from signed lease agreements. Figures marked with a flag icon carry a data caveat — see each unit's "Notes &amp; flags" panel.
</footer>

<script>
const TENANTS = [
  {
    unit: "31A",
    trading: "The Auto Vault",
    legal: "The Tyre Vault (Pty) Ltd — Reg 2016/405477/07",
    contact: "Chris Hart",
    email: "chrishart7441@gmail.com",
    phone: "",
    start: "2026-04-01",
    end: "2028-02-29",
    base: 29790,
    rate: 0.08,
    model: "annual",
    dueDay: "1st of month",
    deposit: 29790,
    renewalNotice: "3 months before expiry",
    earlyTermNotice: "Not specified in signed pages",
    cancelPenalty: "Not specified in signed pages",
    notes: "Start date handwritten correction on the original: “1 March 2026” struck through, “April” written above it — recorded here as 1 April 2026, confirm against the tenant's original signed copy. Rent escalates 8% at each lease anniversary (Clause 8.2 governs escalation for every subsequent year of the “Lease Period”, a term Clause 2.1.2 defines to include the whole term, not just a formal post-expiry renewal). Early termination notice / cancellation penalty clauses were not present in the pages provided for this lease."
  },
  {
    unit: "31B",
    trading: "Play Pickleball Plett",
    legal: "Karma Blue (Pty) Ltd — Reg 2015/100603/07",
    contact: "Debra Ann Hill",
    email: "",
    phone: "",
    start: "2026-01-01",
    end: "2026-12-31",
    base: 29790,
    rate: 0.07,
    model: "pickleball",
    dueDay: "Within 7 days of month-end (Yr 1 revenue share)",
    deposit: 0,
    renewalNotice: "No fixed notice period — reviewed at year-end",
    earlyTermNotice: "30 days' written notice (material breach)",
    cancelPenalty: "None specified",
    notes: "Year 1 (1 Jan – 31 Dec 2026) has no fixed rent — tenant instead pays 50% of gross revenue monthly, within 7 days of month-end. From Year 2 (1 Jan 2027) rent becomes a fixed R29,790/month if both parties agree the business is viable, then escalates 7% at each subsequent anniversary. The Landlord's signature/date was not completed on the copy provided (tenant signed 5 Dec 2025) — confirm the agreement is fully countersigned. No deposit is specified."
  },
  {
    unit: "32A",
    trading: "The Pork Crackling Company",
    legal: "The Pork Crackling Company (Pty) Ltd — Reg 2023/584936/07",
    contact: "Craig Lellyett / Tony Johnson",
    email: "craig@theporkcrackling.co.za",
    email2: "tony@theporkcrackling.co.za",
    phone: "071 442 0646 / 082 521 5865",
    start: "2025-10-01",
    end: "2030-09-30",
    base: 29790,
    rate: 0.08,
    model: "annual",
    dueDay: "1st of month",
    deposit: 29790,
    renewalNotice: "3 months before expiry",
    earlyTermNotice: "3 calendar months' written notice",
    cancelPenalty: "3 months' rent if cancelled within first 6 months (before ~1 Apr 2026)",
    notes: "Tenant's physical/postal address was changed at signing from “7 Thesen Island, Knysna” to “65 Heuwel Street, Wittedrif” (handwritten in blue ink) — this tracker uses the updated address; confirm which is current. Rent escalates 8% at each lease anniversary throughout the full 5-year initial term (Clause 8.2 governs every subsequent year of the “Lease Period”, defined in Clause 2.1.2 to include the whole term). Improvement costs listed in Clause 15 were left blank in the signed copy — no amortized addition to rent has been assumed."
  },
  {
    unit: "32B",
    trading: "CrossFit Plett",
    legal: "Just Physical Health (Pty) Ltd — Reg 2013/194898/07",
    contact: "Donald Ravenscroft",
    email: "donald@crossfitplett.com",
    phone: "076 612 5335",
    start: "2025-10-01",
    end: "2027-09-30",
    base: 29790,
    rate: 0.06,
    model: "annual",
    dueDay: "8th of month",
    deposit: 29790,
    renewalNotice: "3 months before expiry",
    earlyTermNotice: "3 calendar months' written notice",
    cancelPenalty: "3 months' rent if cancelled within first 6 months (before ~1 Apr 2026)",
    notes: "Tenant's physical/postal address was left as the placeholder text “New Warehouse Address?” in the signed lease schedule — confirm actual current address. The Lessee's signing date was not clearly legible on the provided scan (Lessor signed 19 Sept 2025 at Plettenberg Bay). Donald Ravenscroft is also surety on this lease. Rent escalates 6% at each lease anniversary throughout the full 2-year initial term."
  }
];

const R = n => "R" + n.toLocaleString("en-ZA", {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtDate = d => d.toLocaleDateString("en-GB", {day:"2-digit", month:"short", year:"numeric"});

function edate(date, months){
  const d = new Date(date.getTime());
  const targetMonth = d.getMonth() + months;
  const targetYear = d.getFullYear() + Math.floor(targetMonth/12);
  const normMonth = ((targetMonth % 12) + 12) % 12;
  const daysInTarget = new Date(targetYear, normMonth+1, 0).getDate();
  const day = Math.min(d.getDate(), daysInTarget);
  return new Date(targetYear, normMonth, day);
}
function fullYearsBetween(start, end){
  let years = end.getFullYear() - start.getFullYear();
  const anniv = new Date(start.getFullYear()+years, start.getMonth(), start.getDate());
  if (anniv > end) years -= 1;
  return Math.max(years, 0);
}
function monthsBetween(start, end){
  let months = (end.getFullYear()-start.getFullYear())*12 + (end.getMonth()-start.getMonth());
  if (end.getDate() < start.getDate()) months -= 1;
  return Math.max(months, 0);
}
function daysBetween(a, b){ return Math.round((b - a) / 86400000); }

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

function computeRent(t){
  const start = new Date(t.start), end = new Date(t.end);
  if (t.model === "annual"){
    if (TODAY < start) return {rentLabel: "Not yet commenced", rentValue: null, nextDate: start, nextRent: t.base};
    const cappedToday = TODAY < end ? TODAY : end;
    const years = fullYearsBetween(start, cappedToday);
    const rent = t.base * Math.pow(1+t.rate, years);
    let nextDate = edate(start, (years+1)*12);
    const noFurther = nextDate > end;
    const nextRent = t.base * Math.pow(1+t.rate, years+1);
    return {rentLabel: R(rent), rentValue: rent, nextDate: noFurther ? null : nextDate, nextRent, noFurther};
  } else { // pickleball
    const anchor = edate(start, 12);
    if (TODAY < anchor) return {rentLabel: "Revenue share Yr 1 (50% of gross revenue)", rentValue: null, nextDate: anchor, nextRent: t.base};
    const years = fullYearsBetween(anchor, TODAY);
    const rent = t.base * Math.pow(1+t.rate, years);
    const nextDate = edate(anchor, (years+1)*12);
    const nextRent = t.base * Math.pow(1+t.rate, years+1);
    return {rentLabel: R(rent), rentValue: rent, nextDate, nextRent};
  }
}

function statusFor(days){
  if (days < 0) return {cls:"status-grey", label:"Lease expired"};
  if (days <= 90) return {cls:"status-red", label:"Renewal window — act now"};
  if (days <= 180) return {cls:"status-yellow", label:"Renewal notice due soon"};
  return {cls:"status-green", label:"Active"};
}

document.getElementById("asof").textContent = "Viewing as of " + fmtDate(TODAY);

// ---- KPIs ----
let totalFixedRent = 0, actNow = 0, dueSoon = 0;
const rentResults = TENANTS.map(t => {
  const r = computeRent(t);
  const end = new Date(t.end);
  const days = daysBetween(TODAY, end);
  const st = statusFor(days);
  if (typeof r.rentValue === "number"){
    totalFixedRent += r.rentValue;
  }
  if (st.label.includes("act now")) actNow++;
  if (st.label.includes("due soon")) dueSoon++;
  return {t, r, days, st, end};
});

const kpis = [
  {label:"Tenants", value: TENANTS.length},
  {label:"Current fixed rent roll (ex VAT/mo)", value: R(totalFixedRent)},
  {label:"Renewal action needed now", value: actNow, warn: actNow>0},
  {label:"Renewal notice due soon", value: dueSoon, warn: dueSoon>0},
];
document.getElementById("kpis").innerHTML = kpis.map(k => `
  <div class="kpi">
    <div class="label">${k.label}</div>
    <div class="value ${k.warn ? 'warn':''}">${k.value}</div>
  </div>`).join("");

// ---- Cards ----
document.getElementById("cards").innerHTML = rentResults.map(({t,r,days,st,end}) => {
  const start = new Date(t.start);
  const term = monthsBetween(start, end);
  const renewalDeadline = edate(end, -3);
  const contactLines = [];
  if (t.email) contactLines.push(`<a href="mailto:${t.email}">${t.email}</a>`);
  if (t.email2) contactLines.push(`<a href="mailto:${t.email2}">${t.email2}</a>`);
  if (t.phone) contactLines.push(t.phone);

  return `
  <div class="card">
    <div class="card-head">
      <div class="title-block">
        <span class="unit-badge">UNIT ${t.unit}</span>
        <h2>${t.trading}</h2>
        <div class="legal">${t.legal}</div>
      </div>
      <div class="status-pill ${st.cls}">${st.label}</div>
    </div>
    <div class="card-body">
      <div class="row"><span class="k">Contact</span><span class="v">${t.contact}</span></div>
      ${contactLines.length ? `<div class="contact">${contactLines.join("<br>")}</div>` : ""}

      <div class="row"><span class="k">Lease term</span><span class="v">${fmtDate(start)} → ${fmtDate(end)} (${term} mo)</span></div>
      <div class="row"><span class="k">Days to expiry</span><span class="v">${days}</span></div>

      <div class="rent-highlight">
        <div class="k">Current monthly rent (ex VAT)</div>
        <div class="v">${r.rentLabel}</div>
      </div>
      <div class="row"><span class="k">Next escalation</span><span class="v">${r.nextDate ? fmtDate(r.nextDate) + " → " + R(r.nextRent) : "No further increase (final year)"}</span></div>
      <div class="row"><span class="k">Rent due</span><span class="v">${t.dueDay}</span></div>
      <div class="row"><span class="k">Deposit (ex VAT)</span><span class="v">${t.deposit ? R(t.deposit) : "None specified"}</span></div>
      <div class="row"><span class="k">Renewal notice</span><span class="v">${t.renewalNotice}</span></div>
      <div class="row"><span class="k">Renewal deadline</span><span class="v">${t.renewalNotice.startsWith("3 months") ? fmtDate(renewalDeadline) : "N/A"}</span></div>
      <div class="row"><span class="k">Early termination</span><span class="v">${t.earlyTermNotice}</span></div>
      <div class="row"><span class="k">Cancellation penalty</span><span class="v">${t.cancelPenalty}</span></div>
    </div>
    <details>
      <summary>Notes &amp; flags</summary>
      <div class="flag-text">${t.notes}</div>
    </details>
  </div>`;
}).join("");
</script>

</body>
</html>
