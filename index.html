<!--
  ============================================================================
  HOW THIS PAGE STAYS UP TO DATE  (fully automatic once on GitHub)
  ============================================================================
  • F1  — updates ITSELF. Each visit it pulls the live 2026 schedule + winners
          from the free Jolpica/Ergast API. Offline? it falls back to the data
          below. A "● LIVE" badge shows when live data loaded.

  • MotoGP / Supercross / Motocross / Hard Enduro / Tour de France — no public
          API, so the GitHub Action reads each series' Wikipedia season page
          every 6 hours (on GitHub's servers, no computer needed) and writes the
          winners into data.json. Fully automatic. A weekly Cowork task is an
          OPTIONAL extra that can correct anything the scraper misses.

  • Full results — tap any completed round to expand it. F1 loads the complete
          finishing order live from the API; other series show the winner (plus
          a podium if one has been stored in the data).

  ----------------------------------------------------------------------------
  DATA: on load the page fetches same-origin data.json and uses it for every
  series. If data.json is missing (opened straight off disk) it falls back to
  the SERIES data embedded below, so it always displays.

  EDIT BY HAND: change data.json (or the SERIES seed below). Each round:
      { r:1, date:"2026-03-08", name:"Australian GP", venue:"…", winner:"" }
      date = race day YYYY-MM-DD · winner "" until run · prov:true = unconfirmed date

  HOST FREE ON GITHUB: push this folder to a repo, Settings > Pages > deploy
  from branch (root). See SETUP-github-pages.md.
  ============================================================================
-->
<style>
  :root{
    --bg:#0a0c10; --panel:#13161d; --panel2:#191d26; --line:#262b36;
    --txt:#e8eaf0; --muted:#8a92a4; --gold:#ffcb45;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  header.top{
    padding:26px 20px 18px; text-align:center;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#10131a 0%,var(--bg) 100%);
  }
  header.top h1{font-size:22px;letter-spacing:.5px;font-weight:800}
  header.top p{color:var(--muted);font-size:13px;margin-top:4px}

  .tabs{
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
    padding:16px 12px;position:sticky;top:0;z-index:20;
    background:rgba(10,12,16,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .tab{
    border:1px solid var(--line);background:var(--panel);color:var(--muted);
    padding:9px 16px;border-radius:999px;cursor:pointer;font-size:13px;
    font-weight:700;letter-spacing:.3px;transition:.15s;white-space:nowrap;
  }
  .tab:hover{color:var(--txt);border-color:var(--accent)}
  .tab.active{color:#fff;background:var(--accent);border-color:var(--accent)}

  .wrap{max-width:860px;margin:0 auto;padding:22px 16px 60px}

  .next{
    border:1px solid var(--accent);border-radius:14px;padding:18px 20px;
    background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 22%,transparent),var(--panel));
    margin-bottom:26px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;
  }
  .next .lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);font-weight:800}
  .next .nm{font-size:20px;font-weight:800;margin-top:3px}
  .next .vn{color:var(--muted);font-size:13px;margin-top:2px}
  .count{text-align:center;min-width:84px}
  .count .num{font-size:30px;font-weight:800;line-height:1;color:var(--accent)}
  .count .unit{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
  .count .when{font-size:12px;color:var(--muted)}

  .live{
    display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;
    letter-spacing:.5px;color:#27c463;margin-left:8px;vertical-align:middle;
  }
  .live::before{content:"";width:8px;height:8px;border-radius:50%;background:#27c463;
    box-shadow:0 0 0 0 rgba(39,196,99,.6);animation:pulse 1.8s infinite}
  .live.cached{color:var(--muted)} .live.cached::before{background:var(--muted);animation:none}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(39,196,99,.6)}70%{box-shadow:0 0 0 7px rgba(39,196,99,0)}100%{box-shadow:0 0 0 0 rgba(39,196,99,0)}}

  .sec-title{
    font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
    font-weight:800;margin:24px 4px 12px;border-left:3px solid var(--accent);padding-left:10px;
  }
  .round{margin-bottom:9px}
  .row{
    display:flex;align-items:center;gap:14px;padding:13px 16px;border:1px solid var(--line);
    border-radius:11px;background:var(--panel);transition:.15s;
  }
  .row.clickable{cursor:pointer}
  .row:hover{background:var(--panel2);border-color:color-mix(in srgb,var(--accent) 55%,var(--line))}
  .row.done{opacity:.82}
  .row.done:hover{opacity:1}
  .chev{flex:0 0 auto;color:var(--muted);font-size:12px;transition:transform .15s}
  .round.open .chev{transform:rotate(90deg);color:var(--accent)}
  .round.open .row{border-radius:11px 11px 0 0;border-bottom-color:transparent;background:var(--panel2)}
  .details{
    border:1px solid var(--line);border-top:none;border-radius:0 0 11px 11px;
    background:var(--panel2);padding:8px 14px 12px;
  }
  .res{width:100%;border-collapse:collapse;font-size:13px}
  .res td{padding:5px 6px;border-bottom:1px solid var(--line)}
  .res tr:last-child td{border-bottom:none}
  .res .pos{color:var(--muted);width:30px;font-weight:800;text-align:center}
  .res .ex{color:var(--muted);text-align:right;font-size:12px;white-space:nowrap}
  .res tr.w1 .pos{color:var(--gold)}
  .res tr.w1 td{font-weight:700}
  .dmsg{color:var(--muted);font-size:13px;line-height:1.55;padding:2px 0}
  .dmsg strong{color:var(--txt)}
  .dloading{color:var(--muted);font-size:13px;padding:2px 0}
  .reslink{display:inline-block;margin-top:9px;font-size:12.5px;font-weight:700;
    color:var(--accent);text-decoration:none}
  .reslink:hover{text-decoration:underline}
  .rd{
    flex:0 0 42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;background:color-mix(in srgb,var(--accent) 18%,var(--panel2));
    color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);
  }
  .info{flex:1;min-width:0}
  .info .n{font-weight:700;font-size:15px}
  .info .v{color:var(--muted);font-size:12.5px;margin-top:1px;overflow:hidden;text-overflow:ellipsis}
  .meta{text-align:right;flex:0 0 auto;min-width:96px}
  .meta .d{font-size:13px;font-weight:600;white-space:nowrap}
  .win{
    display:inline-block;margin-top:3px;font-size:12px;font-weight:700;color:#0a0c10;
    background:var(--gold);padding:2px 8px;border-radius:6px;white-space:nowrap;
  }
  .tag{font-size:11px;color:var(--muted);margin-top:3px;display:block}
  .prov{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
    color:var(--gold);border:1px solid color-mix(in srgb,var(--gold) 50%,transparent);
    padding:1px 6px;border-radius:5px;margin-left:6px;vertical-align:middle}
  .empty{color:var(--muted);font-size:13px;padding:10px 4px}
  footer{color:var(--muted);font-size:12px;text-align:center;padding:24px 16px 40px;border-top:1px solid var(--line)}
  footer code{background:var(--panel2);padding:1px 6px;border-radius:5px;color:var(--txt)}
</style>

/* ===========================================================================
   DATA OVERLAY — fetch same-origin data.json (kept current by the GitHub
   Action). Falls back to the embedded SERIES data if absent.
   =========================================================================== */
async function loadDataOverlay(){
  try{
    const r = await fetch("./data.json", { cache:"no-store" });
    if(!r.ok) return;
    const d = await r.json();
    if(d && d.series){
      for(const k of Object.keys(d.series)){
        if(SERIES[k] && Array.isArray(d.series[k].rounds))
          SERIES[k].rounds = d.series[k].rounds;
      }
    }
  }catch(e){ /* no data.json (e.g. local file) — use embedded data */ }
}

/* ===========================================================================
   LIVE F1 — schedule + winners from Jolpica/Ergast; silent fallback.
   =========================================================================== */
async function loadF1Live(){
  const cfg = SERIES.f1.live;
  try{
    const [sRes, wRes] = await Promise.all([ fetch(cfg.races), fetch(cfg.winners) ]);
    if(!sRes.ok || !wRes.ok) throw new Error("bad status");
    const sched = (await sRes.json()).MRData.RaceTable.Races || [];
    const wins  = (await wRes.json()).MRData.RaceTable.Races || [];
    sched.forEach(r=>{ const rd = SERIES.f1.rounds.find(x=>x.r === +r.round); if(rd && r.date) rd.date = r.date; });
    wins.forEach(r=>{
      const w = r.Results && r.Results[0] && r.Results[0].Driver;
      const rd = SERIES.f1.rounds.find(x=>x.r === +r.round);
      if(rd && w) rd.winner = (w.givenName + " " + w.familyName).trim();
    });
    SERIES.f1.liveState = "live";
  }catch(e){ SERIES.f1.liveState = "cached"; }
  if(current === "f1") render("f1");
}

/* ===========================================================================
   RENDERING
   =========================================================================== */
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const order = ["f1","motogp","sx","mx","he","tdf"];
let current = "f1";

const fmtDate = iso => new Date(iso+"T00:00:00").toLocaleDateString(undefined,{day:"numeric",month:"short"});
const daysTo = iso => Math.round((new Date(iso+"T00:00:00") - TODAY)/86400000);
const roundPrefix = s => s.unit === "Stage" ? "Stage " : "R";

function cardHTML(key, rd, done){
  const win = rd.winner && rd.winner.trim()
    ? `<span class="win">🏆 ${rd.winner}</span>`
    : (done ? `<span class="tag">tap for results</span>` : "");
  const prov = rd.prov ? `<span class="prov">provisional</span>` : "";
  const chev = done ? `<span class="chev">▸</span>` : "";
  return `<div class="round" data-id="${key}-${rd.r}">
      <div class="row ${done?'done':''} ${done?'clickable':''}" data-series="${key}" data-round="${rd.r}">
        <div class="rd">${rd.r}</div>
        <div class="info"><div class="n">${rd.name}${prov}</div><div class="v">${rd.venue}</div></div>
        <div class="meta"><div class="d">${fmtDate(rd.date)}</div>${win}</div>
        ${chev}
      </div>
      ${done ? `<div class="details" hidden></div>` : ""}
    </div>`;
}

function resultsTable(list){
  const rows = list.map((r,i)=>{
    let pos, name, ex="";
    if(typeof r === "string"){
      const m = r.match(/^\s*(\d+)[.\)\s]+(.*)$/);
      pos = m ? m[1] : (i+1); name = m ? m[2] : r;
    } else { pos = r.pos ?? (i+1); name = r.name || ""; ex = r.ex || ""; }
    return `<tr class="${+pos===1?'w1':''}"><td class="pos">${pos}</td><td>${name}</td><td class="ex">${ex}</td></tr>`;
  }).join("");
  return `<table class="res"><tbody>${rows}</tbody></table>`;
}

async function f1FullResults(round){
  const url = `https://api.jolpi.ca/ergast/f1/2026/${round}/results.json`;
  const race = (await (await fetch(url)).json()).MRData.RaceTable.Races[0];
  if(!race || !race.Results) return null;
  return race.Results.map(x=>({
    pos: x.position,
    name: `${x.Driver.givenName} ${x.Driver.familyName}`,
    ex:  x.Constructor.name + (x.Time ? " · " + x.Time.time : (x.status ? " · " + x.status : ""))
  }));
}

// Where to send "View full results" for each series (full classification /
// standings live here — season pages only publish the round winner).
const RESULT_URLS = {
  f1:     "https://en.wikipedia.org/wiki/2026_Formula_One_World_Championship",
  motogp: "https://en.wikipedia.org/wiki/2026_MotoGP_World_Championship",
  sx:     "https://en.wikipedia.org/wiki/2026_AMA_Supercross_Championship",
  mx:     "https://en.wikipedia.org/wiki/2026_AMA_Pro_Motocross_Championship",
  he:     "https://fim-hardenduro.com/",
  tdf:    "https://en.wikipedia.org/wiki/2026_Tour_de_France"
};
function resultsLink(key){
  return RESULT_URLS[key]
    ? `<a class="reslink" href="${RESULT_URLS[key]}" target="_blank" rel="noopener">View full results ↗</a>` : "";
}

async function populateDetails(key, rd, el){
  const link = resultsLink(key);
  if(Array.isArray(rd.results) && rd.results.length){ el.innerHTML = resultsTable(rd.results) + link; return; }
  if(rd._full){ el.innerHTML = resultsTable(rd._full); return; }
  if(key === "f1"){
    el.innerHTML = `<div class="dloading">Loading full results…</div>`;
    try{
      const full = await f1FullResults(rd.r);
      if(full && full.length){ rd._full = full; el.innerHTML = resultsTable(full); }
      else el.innerHTML = `<div class="dmsg">Results not published yet.</div>` + link;
    }catch(e){
      el.innerHTML = `<div class="dmsg">Couldn't load live results (offline?).${rd.winner?` Winner: <strong>${rd.winner}</strong>.`:""}</div>` + link;
    }
    return;
  }
  // Non-F1: show the winner we have + a link to the full field/standings.
  el.innerHTML = (rd.winner
    ? `<div class="dmsg"><strong>🏆 Winner:</strong> ${rd.winner}</div>`
    : `<div class="dmsg">Winner not posted yet — check back after the event.</div>`) + link;
}

function onViewClick(e){
  const row = e.target.closest(".row.clickable");
  if(!row) return;
  const round = row.closest(".round");
  const el = round.querySelector(".details");
  if(!el) return;
  if(el.hasAttribute("hidden")){
    el.removeAttribute("hidden"); round.classList.add("open");
    if(!el.dataset.loaded){
      const key = row.dataset.series;
      const rd = SERIES[key].rounds.find(x=>x.r === +row.dataset.round);
      populateDetails(key, rd, el); el.dataset.loaded = "1";
    }
  } else {
    el.setAttribute("hidden",""); round.classList.remove("open");
  }
}

function liveBadge(s){
  if(!s.live) return "";
  if(s.liveState === "live")   return `<span class="live">LIVE</span>`;
  if(s.liveState === "cached") return `<span class="live cached">cached</span>`;
  return `<span class="live cached">loading…</span>`;
}

function render(key){
  current = key;
  const s = SERIES[key];
  document.documentElement.style.setProperty("--accent", s.accent);
  [...document.querySelectorAll(".tab")].forEach(t => t.classList.toggle("active", t.dataset.k === key));

  const past = s.rounds.filter(r => daysTo(r.date) < 0);
  const upcoming = s.rounds.filter(r => daysTo(r.date) >= 0);
  const next = upcoming[0];

  let html = "";
  if(next){
    const dd = daysTo(next.date);
    html += `<div class="next">
        <div><div class="lbl">Up next · ${s.label} ${liveBadge(s)}</div>
          <div class="nm">${roundPrefix(s)}${next.r} — ${next.name}</div>
          <div class="vn">${next.venue}</div></div>
        <div class="count">
          ${dd===0 ? `<div class="num" style="font-size:20px">TODAY</div>`
                   : `<div class="num">${dd}</div><div class="unit">day${dd===1?'':'s'} to go</div>`}
          <div class="when">${fmtDate(next.date)} 2026</div>
        </div></div>`;
  } else {
    html += `<div class="next"><div><div class="lbl">${s.label} ${liveBadge(s)}</div>
        <div class="nm">Season complete</div>
        <div class="vn">All ${s.rounds.length} ${s.unit.toLowerCase()}s have run — see results below</div></div></div>`;
  }

  html += `<div class="sec-title">Upcoming ${s.unit}s</div>`;
  html += upcoming.length
    ? upcoming.map(r => cardHTML(key,r,false)).join("")
    : `<div class="empty">No upcoming ${s.unit.toLowerCase()}s — the season has finished.</div>`;

  html += `<div class="sec-title">Results &amp; completed ${s.unit}s <span style="font-weight:600;text-transform:none;letter-spacing:0;opacity:.7">· tap a row for full results</span></div>`;
  html += past.length
    ? past.slice().reverse().map(r => cardHTML(key,r,true)).join("")
    : `<div class="empty">No ${s.unit.toLowerCase()}s completed yet this season.</div>`;

  document.getElementById("view").innerHTML = html;
}

// Build tabs + wire up
const tabsEl = document.getElementById("tabs");
order.forEach(k=>{
  const b = document.createElement("button");
  b.className = "tab"; b.dataset.k = k; b.textContent = SERIES[k].tab;
  b.onclick = ()=>render(k);
  tabsEl.appendChild(b);
});
document.getElementById("view").addEventListener("click", onViewClick);

// Startup: render fallback, overlay data.json, then live F1.
(async () => {
  render("f1");
  await loadDataOverlay(); render(current);
  loadF1Live();
})();
</script>
</body>
</html>
